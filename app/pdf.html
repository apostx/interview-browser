<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PDF</title>
<style>
  html, body { margin: 0; background: #f5f6f8; }
  @media (prefers-color-scheme: dark) {
    html, body { background: #101418; }
  }
  #pages { max-width: 900px; margin: 0 auto; }
  .page {
    display: block;
    width: 100%;
    height: auto;
    background: #fff;
    margin-bottom: 6px;
  }
  .error {
    font-family: system-ui, sans-serif;
    color: #b91c1c;
    padding: 24px 16px;
    text-align: center;
  }
</style>
</head>
<body>
<div id="pages"></div>
<script type="module">
/*
 * Chromeless PDF rendering: pages as plain full-width canvases, so the PDF
 * feels like part of the site — no PDF.js viewer UI, no own zoom (pinch
 * zooms the page like on any webpage). Pages render lazily on scroll.
 */
import * as pdfjsLib from './vendor/pdfjs/build/pdf.mjs';

pdfjsLib.GlobalWorkerOptions.workerSrc = './vendor/pdfjs/build/pdf.worker.mjs';

const container = document.getElementById('pages');
const file = new URLSearchParams(location.search).get('file');

// Sharpness reserve: render above CSS resolution so browser pinch-zoom stays
// reasonably crisp. Capped to keep memory sane on long documents.
const RENDER_SCALE = Math.min((window.devicePixelRatio || 1) * 1.5, 3);

function fail(message) {
  container.innerHTML = `<p class="error">${message}</p>`;
}

if (!file) {
  fail('Missing file parameter.');
} else {
  try {
    const doc = await pdfjsLib.getDocument({
      url: file,
      cMapUrl: './vendor/pdfjs/web/cmaps/',
      cMapPacked: true,
      standardFontDataUrl: './vendor/pdfjs/web/standard_fonts/',
    }).promise;

    const firstPage = await doc.getPage(1);
    const firstViewport = firstPage.getViewport({ scale: 1 });
    const defaultRatio = firstViewport.width / firstViewport.height;

    async function renderPage(canvas) {
      const page = await doc.getPage(Number(canvas.dataset.page));
      const base = page.getViewport({ scale: 1 });
      const scale = (container.clientWidth / base.width) * RENDER_SCALE;
      const viewport = page.getViewport({ scale });
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      canvas.style.aspectRatio = `${base.width} / ${base.height}`;
      await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
    }

    const observer = new IntersectionObserver(
      (entries) => {
        for (const entry of entries) {
          if (!entry.isIntersecting) continue;
          observer.unobserve(entry.target);
          renderPage(entry.target).catch(console.error);
        }
      },
      { rootMargin: '150% 0%' }
    );

    for (let i = 1; i <= doc.numPages; i++) {
      const canvas = document.createElement('canvas');
      canvas.className = 'page';
      canvas.dataset.page = i;
      canvas.style.aspectRatio = String(defaultRatio);
      container.appendChild(canvas);
      observer.observe(canvas);
    }
  } catch (err) {
    fail(`Failed to load the PDF: ${String(err && err.message ? err.message : err)}`);
  }
}
</script>
</body>
</html>
