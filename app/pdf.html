<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PDF</title>
<link rel="stylesheet" href="pdf-textlayer.css">
<style>
  html, body { margin: 0; background: #f5f6f8; }
  @media (prefers-color-scheme: dark) {
    html, body { background: #101418; }
  }
  #pages { max-width: 900px; margin: 0 auto; padding-top: 6px; }
  .page {
    position: relative;
    width: 100%;
    margin-bottom: 6px;
    background: #fff;
    --scale-round-x: 1px;
    --scale-round-y: 1px;
  }
  .page canvas {
    display: block;
    width: 100%;
    height: 100%;
  }
  .error {
    font-family: system-ui, sans-serif;
    color: #b91c1c;
    padding: 24px 16px;
    text-align: center;
  }
</style>
</head>
<body>
<div id="pages"></div>
<script type="module">
/*
 * Chromeless PDF: pages render as full-width canvases (no PDF.js viewer UI,
 * no own zoom), lazily on scroll. Each page also gets an invisible, aligned
 * text layer (PDF.js TextLayer) so text can be selected and copied natively;
 * everything else about the reader stays off.
 */
import { getDocument, GlobalWorkerOptions, TextLayer, setLayerDimensions } from './vendor/pdfjs/build/pdf.mjs';

GlobalWorkerOptions.workerSrc = './vendor/pdfjs/build/pdf.worker.mjs';

const container = document.getElementById('pages');
const file = new URLSearchParams(location.search).get('file');

// Sharpness reserve: render the canvas above CSS resolution so browser pinch
// zoom stays crisp. Capped to keep memory sane on long documents.
const RENDER_SCALE = Math.min((window.devicePixelRatio || 1) * 1.5, 3);

const DOC_PARAMS = {
  url: file,
  cMapUrl: './vendor/pdfjs/web/cmaps/',
  cMapPacked: true,
  standardFontDataUrl: './vendor/pdfjs/web/standard_fonts/',
};

let doc = null;
let layoutWidth = 0;
let recovering = false;
const records = new Map(); // pageNum -> { pageNum, wrap, canvas, textDiv, rendered, visible, token, task }

function fail(message) {
  container.innerHTML = `<p class="error">${message}</p>`;
}

function errText(err) {
  return String(err && err.message ? err.message : err);
}

async function renderPage(pageNum) {
  const rec = records.get(pageNum);
  if (!rec) return;

  // Cancel any in-flight render for this page so re-renders can't paint stale.
  if (rec.task) {
    try { rec.task.cancel(); } catch {}
    rec.task = null;
  }
  const token = ++rec.token;

  const page = await doc.getPage(pageNum);
  if (token !== rec.token) return;

  const base = page.getViewport({ scale: 1 });
  const cssScale = layoutWidth / base.width; // CSS px per PDF point
  rec.wrap.style.setProperty('--scale-factor', cssScale);
  rec.wrap.style.setProperty('--total-scale-factor', cssScale);
  rec.wrap.style.aspectRatio = `${base.width} / ${base.height}`;

  const canvasViewport = page.getViewport({ scale: cssScale * RENDER_SCALE });
  rec.canvas.width = canvasViewport.width;
  rec.canvas.height = canvasViewport.height;
  const task = page.render({ canvasContext: rec.canvas.getContext('2d'), viewport: canvasViewport });
  rec.task = task;
  try {
    await task.promise;
  } catch (err) {
    if (err && err.name === 'RenderingCancelledException') return;
    throw err;
  }
  if (token !== rec.token) return;
  rec.task = null;

  // Invisible selectable text overlay, aligned to the canvas at CSS scale.
  rec.textDiv.replaceChildren();
  const textViewport = page.getViewport({ scale: cssScale });
  const layer = new TextLayer({
    textContentSource: page.streamTextContent(),
    container: rec.textDiv,
    viewport: textViewport,
  });
  setLayerDimensions(rec.textDiv, textViewport);
  await layer.render();
  if (token !== rec.token) return;
  rec.rendered = true;
}

const observer = new IntersectionObserver(
  (entries) => {
    for (const entry of entries) {
      const rec = records.get(Number(entry.target.dataset.page));
      if (!rec) continue;
      rec.visible = entry.isIntersecting;
      if (entry.isIntersecting && !rec.rendered) {
        renderPage(rec.pageNum).catch(console.error);
      }
    }
  },
  { rootMargin: '150% 0%' }
);

// Returning to the foreground: mobile browsers evict canvas backing stores of a
// backgrounded page, so already-painted pages come back blank. Repaint what is
// on screen now and mark the rest for lazy repaint when scrolled back into view.
async function refresh() {
  if (recovering || records.size === 0) return;
  for (const rec of records.values()) rec.rendered = false;
  const visible = [...records.values()].filter((rec) => rec.visible);
  try {
    for (const rec of visible) await renderPage(rec.pageNum);
  } catch (err) {
    if (err && err.name === 'RenderingCancelledException') return;
    await reinit(); // the worker/document was torn down while backgrounded
  }
}

// Rebuild the document (a fresh worker) in place, keeping the page elements and
// scroll position, then repaint the visible pages.
async function reinit() {
  if (recovering) return;
  recovering = true;
  try {
    try { await doc?.destroy(); } catch {}
    doc = await getDocument(DOC_PARAMS).promise;
    for (const rec of records.values()) {
      rec.rendered = false;
      rec.task = null;
    }
    recovering = false;
    for (const rec of records.values()) {
      if (rec.visible) await renderPage(rec.pageNum);
    }
  } catch (err) {
    recovering = false;
    fail(`Failed to reload the PDF: ${errText(err)}`);
  }
}

// Re-render already-rendered pages when the available width changes (e.g. phone
// rotation), so the text layer stays aligned to the canvas.
function relayout() {
  const width = container.clientWidth;
  if (width === layoutWidth || width === 0) return;
  layoutWidth = width;
  for (const rec of records.values()) {
    if (rec.rendered || rec.visible) renderPage(rec.pageNum).catch(console.error);
  }
}

let resizeTimer = 0;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(relayout, 200);
});

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') refresh();
});
window.addEventListener('pageshow', (event) => {
  if (event.persisted) refresh();
});

async function main() {
  if (!file) {
    fail('Missing file parameter.');
    return;
  }
  try {
    doc = await getDocument(DOC_PARAMS).promise;

    layoutWidth = container.clientWidth;
    const firstPage = await doc.getPage(1);
    const firstBase = firstPage.getViewport({ scale: 1 });
    const placeholderRatio = `${firstBase.width} / ${firstBase.height}`;

    for (let i = 1; i <= doc.numPages; i++) {
      const wrap = document.createElement('div');
      wrap.className = 'page';
      wrap.dataset.page = i;
      wrap.style.aspectRatio = placeholderRatio; // give the page height before it renders
      const canvas = document.createElement('canvas');
      const textDiv = document.createElement('div');
      textDiv.className = 'textLayer';
      wrap.append(canvas, textDiv);
      container.append(wrap);
      records.set(i, { pageNum: i, wrap, canvas, textDiv, rendered: false, visible: false, token: 0, task: null });
      observer.observe(wrap);
    }
  } catch (err) {
    fail(`Failed to load the PDF: ${errText(err)}`);
  }
}

main();
</script>
</body>
</html>
